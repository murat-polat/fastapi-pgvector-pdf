<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Vector Chat - Test</title>
</head>
<body>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 32px; }
        h1 { text-align: center; }
        form { margin-bottom: 24px; }
        .chat-box { border: 1px solid #ddd; border-radius: 6px; background: #fafafa; height: 300px; overflow-y: auto; padding: 16px; margin-bottom: 16px; }
        .chat-message { margin-bottom: 12px; }
        .chat-message.user { text-align: right; color: #1976d2; }
        .chat-message.bot { text-align: left; color: #333; }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input[type="text"] { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        .chat-input button { padding: 8px 16px; border-radius: 4px; border: none; background: #1976d2; color: #fff; cursor: pointer; }
        .chat-input button:disabled { background: #aaa; }
    </style>
<body>
    <div class="container">
        <h1>PDF Chatbot</h1>
        <form id="upload-form" enctype="multipart/form-data">
            <label for="pdf-file">Last opp PDF-fil:</label>
            <input type="file" id="pdf-file" name="file" accept="application/pdf" required>
            <button type="submit">Last opp</button>
        </form>

        <div class="chat-box" id="chat-box">
            <!-- Chat messages will appear here -->
        </div>
        <form id="chat-form" class="chat-input" autocomplete="off">
            <input type="text" id="chat-input" placeholder="Skriv et spørsmål..." required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script>
    const uploadForm = document.getElementById('upload-form');
    const chatForm = document.getElementById('chat-form');
    const chatBox = document.getElementById('chat-box');
    const chatInput = document.getElementById('chat-input');
    let pdfUploaded = false;

    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('pdf-file');
        const file = fileInput.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('file', file);
        try {
            const res = await fetch('/upload-pdf/', {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                const data = await res.json();
                pdfUploaded = true;
                addMessage('PDF lastet opp: ' + data.filename, 'bot');
            } else {
                const err = await res.json();
                addMessage('Feil ved opplasting: ' + (err.detail || 'Ukjent feil'), 'bot');
            }
        } catch (error) {
            addMessage('Nettverksfeil ved opplasting.', 'bot');
        }
    });

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;
        addMessage(message, 'user');
        chatInput.value = '';
        if (!pdfUploaded) {
            addMessage('Last opp en PDF først.', 'bot');
            return;
        }
        try {
            const res = await fetch('/search/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: message })
            });
            if (res.ok) {
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    data.results.forEach((r, i) => {
                        addMessage(`Resultat ${i + 1} (side ${r.page}):\n${r.text}`, 'bot');
                    });
                } else {
                    addMessage('Ingen relevante svar funnet.', 'bot');
                }
            } else {
                addMessage('Feil ved søk.', 'bot');
            }
        } catch (error) {
            addMessage('Nettverksfeil ved søk.', 'bot');
        }
    });

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = 'chat-message ' + sender;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    </script>
</body>
</html>
